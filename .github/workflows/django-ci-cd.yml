name: Django CI/CD with Docker

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: vuth123321
          POSTGRES_DB: InventoryV2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d InventoryV2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: InventoryV2
      DB_USER: postgres
      DB_PASSWORD: vuth123321
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Run migrations
        run: python manage.py migrate

      - name: Create Django superuser
        run: |
          echo "from django.contrib.auth import get_user_model; User = get_user_model(); \
          User.objects.filter(email='admin@gmail.com').exists() or \
          User.objects.create_superuser('admin', 'admin@gmail.com', 'admin123')" | python manage.py shell

      - name: Run tests
        run: python manage.py test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3
      - name: Show Docker user
        run: echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/django-inventory:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/django-inventory:latest
